name: EVE Localization Archive

on:
  schedule:
    # Run daily at 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-download all languages even if hash unchanged"
        required: false
        default: false
        type: boolean
      servers:
        description: "Servers to process (TQ, SISI, or TQ SISI)"
        required: false
        default: "TQ SISI"
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # Parse input to determine which servers to process
  # -------------------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      process-tq: ${{ steps.filter.outputs.tq }}
      process-sisi: ${{ steps.filter.outputs.sisi }}
      matrix: ${{ steps.matrix.outputs.servers }}

    steps:
      - name: Determine servers to process
        id: filter
        run: |
          SERVERS="${{ github.event.inputs.servers || 'TQ SISI' }}"
          TQ="false"
          SISI="false"

          if echo "$SERVERS" | grep -qi "TQ"; then
            TQ="true"
          fi
          if echo "$SERVERS" | grep -qi "SISI"; then
            SISI="true"
          fi

          echo "tq=$TQ" >> "$GITHUB_OUTPUT"
          echo "sisi=$SISI" >> "$GITHUB_OUTPUT"

      - name: Build matrix for processing
        id: matrix
        env:
          PROCESS_TQ: ${{ steps.filter.outputs.tq }}
          PROCESS_SISI: ${{ steps.filter.outputs.sisi }}
        run: |
          SERVERS="[]"
          if [ "$PROCESS_TQ" = "true" ]; then
            SERVERS=$(echo "$SERVERS" | jq '. += ["TQ"]')
          fi
          if [ "$PROCESS_SISI" = "true" ]; then
            SERVERS=$(echo "$SERVERS" | jq '. += ["SISI"]')
          fi
          echo "servers=$SERVERS" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Build stage: Process each server in parallel (matrix)
  # No git commits or pushes in this stage
  # -------------------------------------------------------------------------
  build:
    name: Process ${{ matrix.server }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: ${{ fromJSON(needs.setup.outputs.matrix) }}
      max-parallel: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install requests

      - name: Run pipeline for ${{ matrix.server }}
        id: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          python scripts/run.py ${{ matrix.server }} $FORCE_FLAG

          # Extract build info for logging
          SERVER_LOWER=$(echo "${{ matrix.server }}" | tr '[:upper:]' '[:lower:]')
          if [ -f "state/${SERVER_LOWER}-build.txt" ]; then
            BUILD=$(cat "state/${SERVER_LOWER}-build.txt")
          else
            BUILD="unknown"
          fi
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Processing complete: ${{ matrix.server }} (build: $BUILD)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: localization-${{ matrix.server }}
          path: |
            latest/${{ matrix.server | lower }}/
            state/${{ matrix.server | lower }}-build.txt
            state/${{ matrix.server | lower }}-hashes.json
            CHANGELOG_${{ matrix.server }}.md
          retention-days: 1
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Commit stage: Consolidate and push all changes once
  # -------------------------------------------------------------------------
  commit:
    name: Commit & Push Changes
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Merge artifacts into workspace
        run: |
          echo "Merging artifacts from all servers..."

          for artifact_dir in artifacts/localization-*; do
            if [ ! -d "$artifact_dir" ]; then
              continue
            fi
            
            server=$(basename "$artifact_dir" | sed 's/localization-//')
            echo "Processing server: $server"
            
            # Copy localization data
            if [ -d "$artifact_dir/latest/$server" ]; then
              mkdir -p "latest/$server"
              cp -r "$artifact_dir/latest/$server"/* "latest/$server/" 2>/dev/null || true
            fi
            
            # Copy state files
            server_lower=$(echo "$server" | tr '[:upper:]' '[:lower:]')
            if [ -f "$artifact_dir/state/${server_lower}-build.txt" ]; then
              mkdir -p state
              cp "$artifact_dir/state/${server_lower}-build.txt" "state/"
            fi
            if [ -f "$artifact_dir/state/${server_lower}-hashes.json" ]; then
              mkdir -p state
              cp "$artifact_dir/state/${server_lower}-hashes.json" "state/"
            fi
            
            # Copy changelog
            if [ -f "$artifact_dir/CHANGELOG_${server}.md" ]; then
              cp "$artifact_dir/CHANGELOG_${server}.md" .
            fi
          done

          echo "Artifact merge complete"

      - name: Check for changes
        id: check_changes
        run: |
          git add latest/ state/ CHANGELOG_*.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected, proceeding with commit"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore(localization): update localization data

          automated by GitHub Actions"

      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin ${{ github.ref_name }}

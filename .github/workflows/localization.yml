name: EVE Localization Archive

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-download all languages even if hash unchanged"
        required: false
        default: false
        type: boolean
      servers:
        description: "Servers to process (TQ, SISI, or TQ SISI)"
        required: false
        default: "TQ SISI"
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.servers }}
    steps:
      - name: Determine servers to process
        id: matrix
        run: |
          SERVERS_INPUT="${{ github.event.inputs.servers || 'TQ SISI' }}"
          SERVERS="[]"
          if echo "$SERVERS_INPUT" | grep -qi "TQ"; then
            SERVERS=$(echo "$SERVERS" | jq '. += ["TQ"]')
          fi
          if echo "$SERVERS_INPUT" | grep -qi "SISI"; then
            SERVERS=$(echo "$SERVERS" | jq '. += ["SISI"]')
          fi
          echo "servers=$SERVERS" >> "$GITHUB_OUTPUT"

  build:
    name: Process ${{ matrix.server }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        server: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install requests
      - name: Run localization pipeline
        id: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/run.py "${{ matrix.server }}" $FORCE_FLAG
      - name: Check for changes
        id: changes
        run: |
          SERVER_LOWER=$(echo "${{ matrix.server }}" | tr '[:upper:]' '[:lower:]')
          git add \
            "latest/${SERVER_LOWER}" \
            "state/${SERVER_LOWER}-build.txt" \
            "state/${SERVER_LOWER}-hashes.json" \
            "CHANGELOG_${{ matrix.server }}.md" \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi
      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(localization): update ${{ matrix.server }} localization"
      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git pull --rebase origin "${{ github.ref_name }}" || true
            if git push origin "${{ github.ref_name }}"; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Failed to push after 3 attempts"
          exit 1
